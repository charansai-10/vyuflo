server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any unknown path returns index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the hashed build assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}