# Redirect all HTTP to HTTPS
server {
    listen 80;
    server_name staging.vyuflo.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name staging.vyuflo.com;

    ssl_certificate     /etc/letsencrypt/live/staging.vyuflo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.vyuflo.com/privkey.pem;

    # Allow document uploads up to 50MB (adjust if needed)
    client_max_body_size 50M;

    # API calls -> backend. "backend" is the docker-compose service name.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files (avatars, uploaded docs) are served by the backend at /static
    location /static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else -> the frontend container (React SPA)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}